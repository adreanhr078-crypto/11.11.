kind = "video"
previewPath = "/11-11-teaser/"
title = "11.11 Teaser Video"
version = "1.0.0"
id = "artifacts/11-11-teaser"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/11-11-teaser/" ]
localPort = 18317

[services.development]
run = "pnpm --filter @workspace/11-11-teaser run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/11-11-teaser", "run", "build" ]
publicDir = "artifacts/11-11-teaser/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18317"
BASE_PATH = "/11-11-teaser/"
