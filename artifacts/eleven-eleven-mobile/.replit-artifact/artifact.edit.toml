kind = "mobile"
previewPath = "/mobile/"
title = "11.11 Mobile"
version = "1.0.0"
id = "artifacts/eleven-eleven-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/eleven-eleven-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eleven-eleven-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/eleven-eleven-mobile", "run", "serve" ]

[services.env]
PORT = "3001"
BASE_PATH = "/mobile/"
